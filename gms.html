        .btn-element {
	cursor: pointer;
	transition: transform 0.15s ease;
}

.btn-element:hover {
	transform: scale(1.05);
}

.btn-element:active {
	transform: scale(1);

    .gm-card {
  margin: 5px;
  overflow: hidden;
  border-radius: 25px;
 backdrop-filter: blur(100px) brightness(90%);
}

.gm-card, .gm-card img{
padding: 0px;
background: none;
border: none;
cursor: pointer;
display: inline-block;
transition: 0.2s ease;/* when transform properties are changed on this, within 0.1 secs(more smooth)*/ 
position: relative;
text-align: center;
color: rgb(255, 255, 255);
/*border-radius: 25px;*/
}


.gm-card:hover{
transform: scale(1);  
}


.gm-card:hover .hover-text {
opacity: 1;
bottom: 0px;
}

.gm-card img{
transition: 0.3s ease;
height: 170px;
width: 170px;
display: block;
border-radius: 25px;
}




.gm-card:hover img {
transform: scale(1.1);
filter: grayscale(30%) brightness(60%) blur(5px);
}

.gm-card:active{
transform: scale(0.9); /* makes button get smaller on click*/
}

/* below is for the text on the img*/
/*  joe joe joe    */
.hover-text{
    position: absolute;
    left: 0px;
    bottom: -50%;
    margin: 10px;
    text-align: left;
    width: 70%;
    /*transform: translate(-50%, -50%);*/
/*font-size: 30px;*/
    font-family: "Roboto Condensed", sans-serif;
    font-weight: 500;
    font-style: normal;
    color: rgb(255, 255, 255);
    text-shadow: 3px 3px 10px floralwhite;
    opacity: 0;
    z-index: 3;
    transition: 0.3s ease;
    font-size: 22px;
}

#gm-popup{
    position: absolute;
    position: fixed;
    display: flex;
    height: 100vh;
    width: 100vw;
    top: 0px;
    left: 0px;
    align-items: center; 
    justify-content: center; 
    overflow: hidden;
    line-height: 0px !important;
}

.gm-frame {
    height: 85vh;
    width: 100vw;
    display: block !important;
    line-height: 0px !important;
}

#top-bar {
    position: absolute;
    display: flex;
    top: 0px;
    width: 100vw;
    height: 7.5vh;
    background-color: rgb(0, 101, 179);
    justify-content: center;
    align-items: center;
}

#bottom-bar {
    position: absolute;
    display: flex;
    bottom: 0px;
    width: 100vw;
    height: 7.5vh;
    background-color: rgb(126, 180, 255);
    justify-content: center;
    align-items: center;
    border: 2px solid black;
}

#right-top-bar {
    position: absolute;
    right: 10px;
}

#x-buttton-gm-popup{
    font-size: 2em;
    cursor: pointer;
}

#fullscreen-button {
    position: absolute;
    right: 0.3em;
}

#blue-bg {
    background-color: rgb(0, 0, 49);
    position: absolute;
    top: 0px;
    left: 0px;
    height: 100vh;
    width: 100vw;
    z-index: -1;
    cursor: no-drop;
}

#search-gms {
    width: 30rem;
    height: 3rem;
    background-color: rgba(0, 111, 105, 0.5);
    border-radius: 1em;
    border: none;
    text-align: center;
    color: aliceblue;
    font-size: 1.3em;
}

#search-gms::placeholder {
    color: rgb(194, 226, 255);
    font-size: 1em;
}


.img-loading {
    background: linear-gradient(45deg, rgba(0, 148, 162, 0.5) 25%, rgba(11, 180, 195, 0.5) 50%, rgba(0, 148, 162, 0.5) 75%);
    background-size: 200% 100%;
    animation: loadingCard 1.2s linear infinite;
}

.img-loading img {
    opacity: 0 !important;
}



#gms-container {
    zoom: 80%;
    width: 90%;
}

.gm-container-wrap {
    display: flex;
    justify-content: center;
}

@keyframes loadingCard {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

        function createFrame() {
            let outsideDiv = document.createElement('div');
            outsideDiv.id = 'gm-popup'
            outsideDiv.innerHTML = `

async function fetchText(url) {
    const response = await fetch(url);
    return response.text();
}



        function createCard(name, image, directory) {
            let OuterDiv = document.createElement('div');
            OuterDiv.classList = 'gm-card img-loading'
            OuterDiv.onclick = () => cardOnClick(directory, name);
            OuterDiv.id = (name + "-gm-card").replaceAll(' ', '~');
            let img = document.createElement('img')
            img.src = image
            img.loading = 'lazy'
            img.alt = 'name'

            img.addEventListener('load', () => {
                let parent = img.parentElement
                parent.classList.remove('img-loading')
            })


            let hoverText = document.createElement('h1')
            hoverText.classList = 'hover-text'
            hoverText.textContent = name

            document.getElementById("gms-container").appendChild(OuterDiv)
            OuterDiv.appendChild(img)
            OuterDiv.appendChild(hoverText)
        }

        async function cardOnClick(locationOfCode, nameOfGame) {

            let frame = document.getElementById("frame-gm");

            code = await code.text();

            frame.contentDocument.open();
            frame.contentDocument.write(code);
            frame.contentDocument.close();

            frame.contentDocument.addEventListener("DOMContentLoaded", () => {
                removeAds(frame)
            })
            

            document.getElementById("gm-name").textContent = nameOfGame;
        }

        async function createGmsFromJson() {
            
            let gamesJson = await (await fetch("https://cdn.jsdelivr.net/gh/gn-math/assets/zones.json")).json();    
            window.gamesJson = gamesJson;

            console.log(window.gamesJson)

            gamesJson.forEach(el => {
                if (el.id !== -1) { // no discord sugest games icon
                    
                
                let name = el.name
                if (name.length > maxTextLength) { //if the name is to long, truncate it
                    name = name.slice(0, maxTextLength) + "..."
                }
                let image = el.cover.replace('{COVER_URL}', 'https://cdn.jsdelivr.net/gh/gn-math/covers@main');
                let codeLocation = el.url.replace('{HTML_URL}', 'https://cdn.jsdelivr.net/gh/gn-math/html@main');
                //idk ovo is broken so fixed below

                createCard(name, image, codeLocation)
                }
            });

        }

        function fullscreen() {

            let iframe = document.getElementById("frame-gm")

        if (iframe.requestFullscreen) {
            iframe.requestFullscreen();
        } else if (iframe.mozRequestFullScreen) { // Firefox
            iframe.mozRequestFullScreen();
        } else if (iframe.webkitRequestFullscreen) { // Chrome, Safari, Opera
            iframe.webkitRequestFullscreen();
        } else if (iframe.msRequestFullscreen) { // IE/Edge
            iframe.msRequestFullscreen();
        } else {
            alert("Fullscreen is not supported by this browser.");
        }
}

function closeGmWindow() {
    let div = document.getElementById("gm-popup")
    document.querySelector("main").style.display = 'block'; //show <main> agian
    div.remove()
}
    
    async function searchGms(input) { // idk it needs to be async for some reason

    //gm-card style when visible is inline-block

    gmCards.forEach(el => { // hide all gms
        el.style.display = 'none'
    });
//==========
//=========
inputLower = input.toLowerCase();

for (let i = 0; i < gmNames.length; i++) {
    
     if ((gmNames[i].toLowerCase()).includes(inputLower)) {

        document.getElementById(gmIds[i]).style.display = 'inline-block'
      }

}


}

let searchInput = document.getElementById("search-gms")
