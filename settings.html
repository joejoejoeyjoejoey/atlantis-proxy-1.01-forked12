            --btnBorderRaduis: 10px;

        .dropdown-options li {

        button:not(.dropdown) {

            backdrop-filter: var(--btnBgFilter);
            width: var(--btnWidth);
            height: var(--btnHeight);
            transition: all 0.2s ease;
            border: 2px solid var(--btnBorderClr);
            border-radius: var(--btnBorderRaduis);

            background-color: var(--mainBg);
        }

        .setting-section-cloak {

            flex-shrink: 0;   /* prevents shrinking */
            flex-grow: 0;     /* prevents growing */
            flex-direction: column;
            align-items: center;
            background-color: var(--innerSectionBg);
            backdrop-filter: var(--innetSectionFil);
            width: 90%;
            height: fit-content;
            border-radius: 30px;
            padding: 30px;
        }

        .center-content {
            display: flex;
            justify-content: center;
        }

        .flex {
            display: flex;
        }


        input {
            background-color: var(--btnBg);
            backdrop-filter: var(--btnBgFilter);
            width: var(--btnWidth);
            height: var(--btnHeight);
            transition: all 0.2s ease;
            border: none;
            border-radius: var(--btnBorderRaduis);
            color: var(--btnTxtClr);
            font-weight: 700;
        }

        document.querySelector("#cloaksDropdown").addEventListener("change", (event) => {

        document.querySelector('#faviconChangeInpt').addEventListener("change", function () {

        //                                                                                                            |

        function showCustomFav() {
            let customFavDiv = document.querySelector("#customCloakSettings")
            customFavDiv.style.opacity = "1"
            customFavDiv.style.height = ""
            customFavDiv.style.border = ""

            
        }

        function resetCustomFav() {
            let customFavDiv = document.querySelector("#customCloakSettings")
            customFavDiv.style.opacity = "0"
            customFavDiv.style.height = "10px"
            customFavDiv.style.border = "none"
        }

        resetCustomFav()

        function saveSettings() {
            parent.postMessage({
                    "cloak": {
                        "favicon": pageFavLink,
                        "title": pageTitle
                    }
                })

                console.log("Saved Settings, Fav: ", pageFavLink, " Title: ", pageTitle)

                localStorage.setItem("selectedFavOption", selectedFavOption)
                localStorage.setItem("customFavConfig", JSON.stringify(customFavConfig))
        }

                function normalizeUrl(url) {
  try {
    // add protocall
    let withProtocol = url.match(/^https?:\/\//) ? url : `https://${url}`;
    let  hostname  = new URL(withProtocol);
    hostname = hostname.hostname
    // remove www
    return hostname.replace(/^www\./, "");
  } catch {
    return url; // original if error
  }
}

function doStartUpStuffFav() {
    let selectedOption = selectedFavOption;
    let cloaksDropdown = document.querySelector("#cloaksDropdown");
    let customCloakObject = customFavConfig;

    dropLib.setDropdown(cloaksDropdown, selectedOption)

    let pageTitleInpt = document.querySelector("#pageTitleInpt")
    let pageFavInpt = document.querySelector("#faviconChangeInpt")

    pageTitleInpt.value = customCloakObject.ttl;


    let url = customCloakObject.fav;
    url = url.match(/[^/]+$/)[0];

    pageFavInpt.value = url;

            let titleInpt = document.querySelector("#pageTitleInpt")

            pageFavLink = "https://icon.horse/icon/" + normalizeUrl(favChngInpt.value);
            console.log("CUSTOM")
    }

}
