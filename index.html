		<div class="vanta" style="position: absolute; top: 0px; left: 0px; width: 100vw; height: 100vh; display: none;"></div>

</main>
<style>
	:root {
		--bgFilter: brightness(90%);
	}

	body {
		overflow: hidden;
	}

	body::before {
		content: '';
		background-color: rgba(0, 0, 0, 0);
		backdrop-filter: var(--bgFilter);
		position: absolute;
		top: 0px;
		left: 0px;
		width: 100vw;
		height: 100vh;
	}
</style>
	<script>

		const mainFrame = document.getElementById("content-frame");


			function changeFavAndTitle(faviconHref, title) {
		let favicon = document.querySelector("#favicon-link");
		favicon.href = faviconHref;

		document.title = title;
	}


		function sideBarIconOnClick(page) {
			document.documentElement.style.setProperty("--bgFilter", "brightness(90%)")
			mainFrame.src = page;
		}


		window.addEventListener("message", (event) => {
  		//event.data
			let message = event.data

			if (message.bgFilter) {
				document.documentElement.style.setProperty("--bgFilter", message.bgFilter);
			}

			if (message.cloak) {
				changeFavAndTitle(message.cloak.favicon, message.cloak.title)
			}
		
	});

	function applyFavicon() {
		let selectedFavOption = localStorage.getItem("selectedFavOption")
		let customConfig = JSON.parse(localStorage.getItem("customFavConfig"))
		let favKey = {
            "Clever": {
                fav: "/img/favicons/clever.png",
                ttl: "Clever | Portal"
            },

            "Google Classroom": {
                fav: "https://www.gstatic.com/classroom/ic_product_classroom_144.png",
                ttl: "Home - Classroom"
            },
            "Google Drive": {
                fav: "https://www.gstatic.com/classroom/ic_product_classroom_144.png",
                ttl: "Home - Google Drive"
            },

            "None": {
                fav: "/img/Logo-Guy-Thick-Lines-Square-Crop.png",
                ttl: "Atlantis - Explore a hidden city of unblocked games, a proxy, and more..."
            }
        }

		if (selectedFavOption != "Custom") {
			let fav = favKey[selectedFavOption].fav
			let ttl = favKey[selectedFavOption].ttl
			
			changeFavAndTitle(fav, ttl)
		} else {
			changeFavAndTitle(customConfig.fav, customConfig.ttl)
		}
	}

	applyFavicon()

	</script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

  midtoneColor: 0x0,
  lowlightColor: 0x0,

})





sideBarIconOnClick('/settings.html')
</script>
